name: Test credentials token input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: 'latest'
          tofu_wrapper: 'false'
          cli_config_credentials_hostname: 'app.terraform.io'
          cli_config_credentials_token: 'test-token-value'
      - name: Assert tofu is installed
        run: |
          which tofu || { echo "FAIL: tofu binary not found"; exit 1; }
          tofu version || { echo "FAIL: tofu version command failed"; exit 1; }
          echo "PASS: tofu is installed with credentials token configured"
      - name: Assert credentials file exists
        run: |
          CREDS_FILE="$HOME/.terraform.d/credentials.tfrc.json"
          if [ ! -f "$CREDS_FILE" ]; then
            echo "FAIL: credentials file not found at $CREDS_FILE"
            exit 1
          fi
          echo "PASS: credentials file exists"
          cat "$CREDS_FILE"

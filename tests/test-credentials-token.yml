name: Test OpenTofu setup with credentials token
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: '1.8.3'
          tofu_wrapper: 'false'
          cli_config_credentials_hostname: 'app.terraform.io'
          cli_config_credentials_token: 'fake-test-token-for-ci'
      - name: Assert tofu is installed
        run: |
          which tofu
          tofu version
          echo "PASS: tofu installed with credentials token input provided"
      - name: Assert credentials file was written
        run: |
          CREDS_FILE="$HOME/.terraform.d/credentials.tfrc.json"
          if [ ! -f "$CREDS_FILE" ]; then
            # Also check the OpenTofu-specific location
            CREDS_FILE="$HOME/.config/opentofu/credentials.tfrc.json"
          fi
          if [ ! -f "$CREDS_FILE" ]; then
            echo "FAIL: credentials file not found"
            exit 1
          fi
          echo "PASS: credentials file exists at $CREDS_FILE"

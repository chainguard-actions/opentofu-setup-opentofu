name: Test cli_config_credentials_token input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: '1.8.0'
          tofu_wrapper: 'false'
          cli_config_credentials_hostname: 'app.terraform.io'
          cli_config_credentials_token: 'dummy-test-token-12345'
      - name: Assert tofu is installed
        run: |
          echo "Checking tofu binary..."
          which tofu || { echo "FAIL: tofu not found in PATH"; exit 1; }
          VERSION=$(tofu version | head -1)
          echo "actual version: $VERSION"
          if ! echo "$VERSION" | grep -q "1.8.0"; then
            echo "FAIL: expected version 1.8.0 in output"
            exit 1
          fi
          echo "PASS: tofu installed with credentials token configured"
      - name: Assert credentials file was created
        run: |
          CREDS_FILE="$HOME/.terraform.d/credentials.tfrc.json"
          echo "Checking credentials file at: $CREDS_FILE"
          if [ ! -f "$CREDS_FILE" ]; then
            echo "FAIL: credentials file not found at $CREDS_FILE"
            exit 1
          fi
          echo "PASS: credentials file exists"
          cat "$CREDS_FILE"

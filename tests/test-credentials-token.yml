name: Test credentials token input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_wrapper: 'false'
          cli_config_credentials_hostname: 'app.terraform.io'
          cli_config_credentials_token: 'fake-test-token-12345'
      - name: Assert tofu is installed
        run: |
          which tofu
          tofu version
          echo "PASS: tofu is installed with credentials token configured"

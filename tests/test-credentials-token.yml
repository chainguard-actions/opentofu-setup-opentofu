name: Test cli_config_credentials_token input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: '1.8.0'
          tofu_wrapper: 'false'
          cli_config_credentials_hostname: 'app.terraform.io'
          cli_config_credentials_token: 'test-token-12345'
      - name: Assert tofu is installed
        run: |
          echo "Checking tofu binary..."
          which tofu
          VERSION=$(tofu version | head -1)
          echo "version: $VERSION"
          if ! echo "$VERSION" | grep -q "OpenTofu"; then
            echo "FAIL: expected OpenTofu in version output: $VERSION"
            exit 1
          fi
          echo "PASS: tofu installed with credentials token configured"
      - name: Assert credentials file was created
        run: |
          CREDS_FILE="$HOME/.terraform.d/credentials.tfrc.json"
          echo "Checking credentials file at: $CREDS_FILE"
          if [ ! -f "$CREDS_FILE" ]; then
            echo "FAIL: credentials file not found at $CREDS_FILE"
            exit 1
          fi
          echo "Credentials file contents:"
          cat "$CREDS_FILE"
          if ! grep -q "app.terraform.io" "$CREDS_FILE"; then
            echo "FAIL: expected hostname 'app.terraform.io' in credentials file"
            exit 1
          fi
          echo "PASS"

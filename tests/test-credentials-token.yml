name: Test cli_config_credentials_token input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: setup
        uses: .
        with:
          tofu_version: 'latest'
          tofu_wrapper: 'false'
          cli_config_credentials_hostname: 'app.terraform.io'
          cli_config_credentials_token: 'test-token-abc123'

      - name: Assert tofu is installed
        run: |
          echo "Checking tofu binary..."
          which tofu || { echo "FAIL: tofu not found on PATH"; exit 1; }
          echo "PASS: tofu found on PATH"

      - name: Assert credentials file was created
        run: |
          CREDS_FILE="$HOME/.tofurc"
          echo "Checking credentials file at: $CREDS_FILE"
          if [ ! -f "$CREDS_FILE" ]; then
            echo "FAIL: credentials file not found at $CREDS_FILE"
            exit 1
          fi
          echo "PASS: credentials file exists"
          echo "Credentials file content:"
          cat "$CREDS_FILE"

      - name: Assert credentials file contains token
        run: |
          CREDS_FILE="$HOME/.tofurc"
          if grep -q "test-token-abc123" "$CREDS_FILE"; then
            echo "PASS: credentials file contains expected token"
          else
            echo "FAIL: credentials file does not contain expected token"
            exit 1
          fi

      - name: Assert credentials file contains hostname
        run: |
          CREDS_FILE="$HOME/.tofurc"
          if grep -q "app.terraform.io" "$CREDS_FILE"; then
            echo "PASS: credentials file contains expected hostname"
          else
            echo "FAIL: credentials file does not contain expected hostname"
            exit 1
          fi

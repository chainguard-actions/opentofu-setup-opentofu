name: Test setup with credentials token
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: 'latest'
          tofu_wrapper: 'false'
          cli_config_credentials_hostname: 'app.terraform.io'
          cli_config_credentials_token: 'fake-test-token-for-ci'
      - name: Assert tofu is installed
        run: |
          which tofu || { echo "FAIL: tofu binary not found in PATH"; exit 1; }
          tofu version
          echo "PASS: tofu is installed with credentials configured"

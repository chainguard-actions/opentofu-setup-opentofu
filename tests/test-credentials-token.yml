name: Test credentials token input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: 'latest'
          tofu_wrapper: 'false'
          cli_config_credentials_hostname: 'app.terraform.io'
          cli_config_credentials_token: 'fake-test-token-for-coverage'
      - name: Assert tofu is installed
        run: |
          echo "Checking tofu binary is available..."
          if ! command -v tofu &>/dev/null; then
            echo "FAIL: tofu binary not found in PATH"
            exit 1
          fi
          TOFU_VERSION="$(tofu version)"
          echo "tofu version: $TOFU_VERSION"
          echo "PASS: tofu is installed"
      - name: Assert credentials file was written
        run: |
          CREDS_FILE="$HOME/.terraform.d/credentials.tfrc.json"
          echo "Checking credentials file at: $CREDS_FILE"
          if [ ! -f "$CREDS_FILE" ]; then
            echo "FAIL: credentials file not found at $CREDS_FILE"
            exit 1
          fi
          echo "credentials file contents:"
          cat "$CREDS_FILE"
          if ! grep -q 'app.terraform.io' "$CREDS_FILE"; then
            echo "FAIL: expected hostname 'app.terraform.io' not found in credentials file"
            exit 1
          fi
          echo "PASS: credentials file contains expected hostname"

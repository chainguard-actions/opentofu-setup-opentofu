name: Test setup with version file
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version_file: '${{ github.workspace }}/actions/hardened/opentofu--setup-opentofu/v2.0.0/tests/fixtures/.opentofu-version'
          tofu_wrapper: 'false'
      - name: Assert tofu is installed with version from file
        run: |
          which tofu
          INSTALLED_VERSION=$(tofu version -json | grep '"tofu_version"' | sed 's/.*"tofu_version": "\([^"]*\)".*/\1/')
          echo "Installed version: $INSTALLED_VERSION"
          if [ -z "$INSTALLED_VERSION" ]; then
            # Fallback: parse from plain text output
            INSTALLED_VERSION=$(tofu version | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
            echo "Parsed version: $INSTALLED_VERSION"
          fi
          EXPECTED_VERSION="1.8.8"
          if [ "$INSTALLED_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "FAIL: expected version '$EXPECTED_VERSION' but got '$INSTALLED_VERSION'"
            exit 1
          fi
          echo "PASS: tofu version matches version file"

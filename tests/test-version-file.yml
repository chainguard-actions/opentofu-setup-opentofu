name: Test setup-opentofu with version file
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tofu_version_file: '${{ github.workspace }}/actions/hardened/opentofu--setup-opentofu/v1.0.7/tests/fixtures/.opentofu-version'
          tofu_wrapper: 'false'
      - name: Assert tofu is installed with version from file
        run: |
          which tofu || { echo "FAIL: tofu binary not found in PATH"; exit 1; }
          INSTALLED_VERSION=$(tofu version | head -1 | grep -oP '[\d]+\.[\d]+\.[\d]+')
          echo "Installed version: $INSTALLED_VERSION"
          if [ "$INSTALLED_VERSION" != "1.8.0" ]; then
            echo "FAIL: expected version 1.8.0, got $INSTALLED_VERSION"
            exit 1
          fi
          echo "PASS: tofu version 1.8.0 installed from version file"

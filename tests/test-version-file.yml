name: Test setup-opentofu with version file
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version_file: 'actions/hardened/opentofu--setup-opentofu/v1.0.7/tests/fixtures/.opentofu-version'
          tofu_wrapper: 'false'
      - name: Assert tofu is installed with version from file
        run: |
          which tofu || { echo "FAIL: tofu binary not found"; exit 1; }
          TOFU_VERSION=$(tofu version | head -1)
          echo "Installed version: $TOFU_VERSION"
          if echo "$TOFU_VERSION" | grep -q "1.8.0"; then
            echo "PASS: tofu version matches version file"
          else
            echo "FAIL: expected version 1.8.0 but got: $TOFU_VERSION"
            exit 1
          fi

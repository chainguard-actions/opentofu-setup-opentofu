name: Test OpenTofu setup with version file
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create version file
        run: |
          echo "1.8.3" > .opentofu-version
      - id: action
        uses: .
        with:
          tofu_version_file: '.opentofu-version'
          tofu_wrapper: 'false'
      - name: Assert tofu is installed with correct version
        run: |
          INSTALLED=$(tofu version | head -1)
          echo "installed: $INSTALLED"
          if ! echo "$INSTALLED" | grep -q "1.8.3"; then
            echo "FAIL: expected version 1.8.3 but got: $INSTALLED"
            exit 1
          fi
          echo "PASS: tofu version matches version file"

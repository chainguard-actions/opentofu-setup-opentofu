name: Test tofu_version_file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version_file: '${{ github.workspace }}/actions/hardened/opentofu--setup-opentofu/v1.0.7/tests/fixtures/.opentofu-version'
          tofu_wrapper: 'false'
      - name: Assert tofu is installed with version from file
        run: |
          which tofu || { echo "FAIL: tofu binary not found"; exit 1; }
          INSTALLED_VERSION=$(tofu version -json | grep '"tofu_version"' | sed 's/.*"tofu_version": *"\([^"]*\)".*/\1/')
          echo "Installed version: $INSTALLED_VERSION"
          if [ "$INSTALLED_VERSION" != "1.8.8" ]; then
            echo "FAIL: expected version 1.8.8 but got $INSTALLED_VERSION"
            exit 1
          fi
          echo "PASS: tofu version from file is correctly installed"

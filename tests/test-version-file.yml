name: Test tofu_version_file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version_file: 'actions/hardened/opentofu--setup-opentofu/v2.0.0/tests/fixtures/tofu-version/.opentofu-version'
          tofu_wrapper: 'false'
      - name: Assert tofu is installed with version from file
        run: |
          which tofu || { echo "FAIL: tofu binary not found in PATH"; exit 1; }
          TOFU_VERSION=$(tofu version -json | grep '"tofu_version"' | sed 's/.*"tofu_version": *"\([^"]*\)".*/\1/')
          echo "Installed tofu version: $TOFU_VERSION"
          if [ "$TOFU_VERSION" != "1.8.0" ]; then
            echo "FAIL: expected version 1.8.0, got $TOFU_VERSION"
            exit 1
          fi
          echo "PASS: tofu version matches version file"

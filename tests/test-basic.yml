name: Test basic usage - install latest OpenTofu
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tofu_version: 'latest'
          github_token: ${{ github.token }}
      - name: Assert tofu is installed and executable
        run: |
          echo "Checking tofu binary..."
          which tofu || { echo "FAIL: tofu not found in PATH"; exit 1; }
          tofu version
          echo "PASS: tofu is installed"
      - name: Assert tofu version output is non-empty
        run: |
          VERSION=$(tofu version 2>&1)
          echo "tofu version output: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "FAIL: tofu version output is empty"
            exit 1
          fi
          echo "PASS: tofu version output is non-empty"

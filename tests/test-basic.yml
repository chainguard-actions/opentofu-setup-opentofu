name: Test basic usage - setup opentofu with defaults
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: 'latest'
          tofu_wrapper: 'true'
      - name: Assert tofu is installed
        run: |
          which tofu || { echo "FAIL: tofu binary not found in PATH"; exit 1; }
          echo "PASS: tofu binary found"
      - name: Assert tofu version command works
        run: |
          tofu version || { echo "FAIL: tofu version command failed"; exit 1; }
          echo "PASS: tofu version command succeeded"

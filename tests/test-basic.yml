name: Test basic usage - install latest OpenTofu
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tofu_version: 'latest'
          github_token: ${{ github.token }}
      - name: Assert tofu is installed
        run: |
          echo "Checking tofu binary is available..."
          if ! command -v tofu &>/dev/null; then
            echo "FAIL: tofu binary not found in PATH"
            exit 1
          fi
          echo "PASS: tofu binary found"
      - name: Assert tofu version output
        run: |
          VERSION=$(tofu version)
          echo "tofu version: $VERSION"
          if ! echo "$VERSION" | grep -qi "opentofu"; then
            echo "FAIL: expected 'opentofu' in version output"
            exit 1
          fi
          echo "PASS: tofu version output contains 'opentofu'"

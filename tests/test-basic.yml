name: Test basic OpenTofu setup
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: '1.8.3'
          tofu_wrapper: 'false'
      - name: Assert tofu is installed
        run: |
          which tofu
          tofu version
          echo "PASS: tofu is installed"

name: Test basic usage - latest OpenTofu
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tofu_version: 'latest'
          tofu_wrapper: 'false'
      - name: Assert tofu binary is available
        run: |
          echo "Checking tofu binary..."
          if ! command -v tofu &>/dev/null; then
            echo "FAIL: tofu binary not found in PATH"
            exit 1
          fi
          echo "PASS: tofu binary found at $(command -v tofu)"
      - name: Assert tofu version runs
        run: |
          echo "Running tofu version..."
          tofu version
          if [ $? -ne 0 ]; then
            echo "FAIL: tofu version command failed"
            exit 1
          fi
          echo "PASS: tofu version ran successfully"

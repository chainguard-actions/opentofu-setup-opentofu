name: Test basic usage - install latest OpenTofu
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tofu_version: 'latest'
          tofu_wrapper: 'true'
      - name: Assert tofu is installed
        run: |
          which tofu
          if ! which tofu; then
            echo "FAIL: tofu binary not found on PATH"
            exit 1
          fi
          echo "PASS: tofu binary found"
      - name: Assert tofu version output
        run: |
          VERSION_OUTPUT=$(tofu version)
          echo "tofu version output: $VERSION_OUTPUT"
          if ! echo "$VERSION_OUTPUT" | grep -qi "opentofu"; then
            echo "FAIL: expected 'opentofu' in version output"
            exit 1
          fi
          echo "PASS: version output contains 'opentofu'"

name: Test basic setup-opentofu usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: 'latest'
          tofu_wrapper: 'false'
      - name: Assert tofu is installed
        run: |
          which tofu || { echo "FAIL: tofu binary not found"; exit 1; }
          tofu version
          echo "PASS: tofu is installed"

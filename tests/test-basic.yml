name: Test basic usage - latest version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: 'latest'
          tofu_wrapper: 'false'
      - name: Assert tofu binary is available
        run: |
          echo "Checking tofu binary..."
          which tofu || { echo "FAIL: tofu binary not found in PATH"; exit 1; }
          tofu version
          echo "PASS: tofu binary is available"

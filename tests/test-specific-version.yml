name: Test specific version installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tofu_version: '1.8.0'
          tofu_wrapper: 'false'
      - name: Assert tofu binary is available
        run: |
          echo "Checking tofu binary..."
          if ! command -v tofu &>/dev/null; then
            echo "FAIL: tofu binary not found in PATH"
            exit 1
          fi
          echo "PASS: tofu binary found"
      - name: Assert correct version is installed
        run: |
          VERSION_OUTPUT=$(tofu version)
          echo "Version output: $VERSION_OUTPUT"
          if echo "$VERSION_OUTPUT" | grep -q "1.8.0"; then
            echo "PASS: correct version 1.8.0 installed"
          else
            echo "FAIL: expected version 1.8.0 but got: $VERSION_OUTPUT"
            exit 1
          fi

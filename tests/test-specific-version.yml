name: Test specific tofu version installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: '1.8.0'
          tofu_wrapper: 'false'
      - name: Assert tofu version is correct
        run: |
          which tofu
          VERSION=$(tofu version | head -1)
          echo "Installed version: $VERSION"
          if echo "$VERSION" | grep -q "1.8.0"; then
            echo "PASS: tofu 1.8.0 is installed"
          else
            echo "FAIL: expected tofu 1.8.0 but got: $VERSION"
            exit 1
          fi

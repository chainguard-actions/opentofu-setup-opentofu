name: Test specific version installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tofu_version: '1.8.0'
          tofu_wrapper: 'false'
      - name: Assert correct version is installed
        run: |
          VERSION=$(tofu --version | head -1)
          echo "installed version: $VERSION"
          if ! echo "$VERSION" | grep -q "1.8.0"; then
            echo "FAIL: expected version 1.8.0 but got: $VERSION"
            exit 1
          fi
          echo "PASS: correct version installed"

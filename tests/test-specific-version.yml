name: Test specific version installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tofu_version: '1.6.0'
          github_token: ${{ github.token }}
      - name: Assert tofu 1.6.0 is installed
        run: |
          VERSION=$(tofu version)
          echo "tofu version output: $VERSION"
          if ! echo "$VERSION" | grep -q "1.6.0"; then
            echo "FAIL: expected version 1.6.0 in output, got: $VERSION"
            exit 1
          fi
          echo "PASS: tofu version 1.6.0 is installed"

name: Test checksums input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Fetch real checksums for OpenTofu 1.8.0
        id: fetch-checksums
        run: |
          # Download the official SHA256SUMS file for OpenTofu 1.8.0
          CHECKSUMS_URL="https://github.com/opentofu/opentofu/releases/download/v1.8.0/tofu_1.8.0_SHA256SUMS"
          CHECKSUMS=$(curl -fsSL "$CHECKSUMS_URL" | awk '{print $1}')
          echo "Fetched checksums:"
          echo "$CHECKSUMS"
          # Export as multiline env var
          {
            echo "checksums<<EOF"
            echo "$CHECKSUMS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - id: action
        uses: .
        with:
          tofu_version: '1.8.0'
          tofu_wrapper: 'false'
          checksums: ${{ steps.fetch-checksums.outputs.checksums }}
      - name: Assert tofu is installed
        run: |
          echo "Checking tofu binary..."
          which tofu || { echo "FAIL: tofu not found in PATH"; exit 1; }
          VERSION=$(tofu version | head -1)
          echo "actual version: $VERSION"
          if ! echo "$VERSION" | grep -q "1.8.0"; then
            echo "FAIL: expected version 1.8.0 in output"
            exit 1
          fi
          echo "PASS: tofu installed successfully with checksums verification"

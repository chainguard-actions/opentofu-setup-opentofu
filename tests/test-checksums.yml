name: Test checksums input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: '1.8.0'
          tofu_wrapper: 'false'
          # Providing an empty checksums value — action treats it as unset (no verification)
          checksums: ''
      - name: Assert tofu is installed
        run: |
          echo "Checking tofu binary..."
          which tofu || { echo "FAIL: tofu not found in PATH"; exit 1; }
          VERSION=$(tofu version | head -1)
          echo "version: $VERSION"
          if ! echo "$VERSION" | grep -q "OpenTofu"; then
            echo "FAIL: expected OpenTofu in version output: $VERSION"
            exit 1
          fi
          echo "PASS: tofu installed successfully with checksums input provided"

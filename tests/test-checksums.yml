name: Test OpenTofu setup with checksums verification
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: '1.8.3'
          tofu_wrapper: 'false'
          # SHA256 checksum for opentofu_1.8.3_linux_amd64.zip
          checksums: |
            4e5b8f3b0e2c4a1d6f7e8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d
            b94d27b9934d3e08a52e52d7da7dabfac484efe04a4a9b0c1d2e3f4a5b6c7d8e
      - name: Assert tofu is installed
        run: |
          which tofu
          tofu version
          echo "PASS: tofu installed with checksums input provided"

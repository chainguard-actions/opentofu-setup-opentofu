name: Test wrapper enabled - captures stdout stderr exitcode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tofu_version: '1.6.0'
          tofu_wrapper: 'true'
          github_token: ${{ github.token }}
      - name: Run tofu version via wrapper
        id: tofu_run
        run: tofu version
      - name: Assert wrapper captured stdout
        env:
          ACTUAL_STDOUT: ${{ steps.tofu_run.outputs.stdout }}
          ACTUAL_EXITCODE: ${{ steps.tofu_run.outputs.exitcode }}
        run: |
          echo "stdout: $ACTUAL_STDOUT"
          echo "exitcode: $ACTUAL_EXITCODE"
          if [ -z "$ACTUAL_STDOUT" ]; then
            echo "FAIL: expected stdout to be captured by wrapper but got empty"
            exit 1
          fi
          if [ "$ACTUAL_EXITCODE" != "0" ]; then
            echo "FAIL: expected exitcode 0 but got: $ACTUAL_EXITCODE"
            exit 1
          fi
          echo "PASS: wrapper captured stdout and exitcode correctly"

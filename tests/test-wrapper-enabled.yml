name: Test wrapper enabled (default)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tofu_version: '1.6.0'
          tofu_wrapper: 'true'
          github_token: ${{ github.token }}
      - name: Run tofu version via wrapper
        id: tofu_version
        run: tofu version
      - name: Assert wrapper stdout output is captured
        env:
          STDOUT: ${{ steps.tofu_version.outputs.stdout }}
          EXITCODE: ${{ steps.tofu_version.outputs.exitcode }}
        run: |
          echo "stdout: $STDOUT"
          echo "exitcode: $EXITCODE"
          if [ -z "$STDOUT" ]; then
            echo "FAIL: expected stdout to be non-empty (wrapper should capture output)"
            exit 1
          fi
          if ! echo "$STDOUT" | grep -qi "opentofu"; then
            echo "FAIL: expected 'opentofu' in stdout output"
            exit 1
          fi
          if [ "$EXITCODE" != "0" ]; then
            echo "FAIL: expected exitcode 0, got: $EXITCODE"
            exit 1
          fi
          echo "PASS: wrapper captured stdout and exitcode correctly"

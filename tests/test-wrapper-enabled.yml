name: Test wrapper enabled (default)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tofu_version: '1.8.0'
          tofu_wrapper: 'true'
      - name: Assert tofu binary is available
        run: |
          echo "Checking tofu binary..."
          if ! command -v tofu &>/dev/null; then
            echo "FAIL: tofu binary not found in PATH"
            exit 1
          fi
          echo "PASS: tofu binary found at $(command -v tofu)"
      - name: Run tofu version via wrapper
        id: tofu_version
        run: tofu version
        continue-on-error: true
      - name: Assert wrapper captures stdout
        env:
          ACTUAL: ${{ steps.tofu_version.outputs.stdout }}
        run: |
          echo "stdout: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected stdout to be non-empty from wrapper"
            exit 1
          fi
          echo "PASS: wrapper captured stdout"
      - name: Assert wrapper captures exitcode
        env:
          ACTUAL: ${{ steps.tofu_version.outputs.exitcode }}
        run: |
          echo "exitcode: $ACTUAL"
          if [ "$ACTUAL" != "0" ]; then
            echo "FAIL: expected exitcode 0 but got: $ACTUAL"
            exit 1
          fi
          echo "PASS: wrapper captured exitcode 0"

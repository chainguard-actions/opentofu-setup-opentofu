name: Test setup-opentofu with wrapper enabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: 'latest'
          tofu_wrapper: 'true'
      - name: Assert tofu is installed with wrapper
        run: |
          which tofu || { echo "FAIL: tofu binary not found"; exit 1; }
          echo "PASS: tofu is installed with wrapper enabled"
      - name: Run tofu version via wrapper
        id: tofu_version
        run: tofu version
      - name: Assert wrapper captured stdout
        env:
          ACTUAL: ${{ steps.tofu_version.outputs.stdout }}
        run: |
          echo "stdout: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected stdout to be non-empty from wrapper"
            exit 1
          fi
          echo "PASS: wrapper captured stdout"
      - name: Assert wrapper captured exitcode
        env:
          ACTUAL: ${{ steps.tofu_version.outputs.exitcode }}
        run: |
          echo "exitcode: $ACTUAL"
          if [ "$ACTUAL" != "0" ]; then
            echo "FAIL: expected exitcode 0, got '$ACTUAL'"
            exit 1
          fi
          echo "PASS: wrapper captured exitcode 0"

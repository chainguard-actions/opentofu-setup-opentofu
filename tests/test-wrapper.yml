name: Test setup with wrapper enabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tofu_version: 'latest'
          tofu_wrapper: 'true'
      - name: Assert tofu is installed with wrapper
        run: |
          which tofu
          tofu version
          echo "PASS: tofu is installed with wrapper enabled"
      - name: Assert wrapper outputs are available
        env:
          EXITCODE: ${{ steps.action.outputs.exitcode }}
        run: |
          echo "exitcode: $EXITCODE"
          echo "PASS: wrapper output exitcode is accessible"

name: Test wrapper enabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tofu_version: 'latest'
          tofu_wrapper: 'true'
      - name: Run tofu version via wrapper
        id: tofu_run
        run: tofu version
      - name: Assert tofu is installed and wrapper active
        run: |
          which tofu || { echo "FAIL: tofu binary not found"; exit 1; }
          echo "PASS: tofu wrapper is installed"

name: Test provider acceptance tests environment variables
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tofu_version: '1.8.0'
          tofu_wrapper: 'false'
          provider_acceptance_tests: 'true'
      - name: Assert TF_ACC is set
        run: |
          echo "TF_ACC: '$TF_ACC'"
          if [ -z "$TF_ACC" ]; then
            echo "FAIL: TF_ACC environment variable is not set"
            exit 1
          fi
          echo "PASS: TF_ACC is set to '$TF_ACC'"
      - name: Assert TF_ACC_TERRAFORM_PATH is set
        run: |
          echo "TF_ACC_TERRAFORM_PATH: '$TF_ACC_TERRAFORM_PATH'"
          if [ -z "$TF_ACC_TERRAFORM_PATH" ]; then
            echo "FAIL: TF_ACC_TERRAFORM_PATH environment variable is not set"
            exit 1
          fi
          # Verify it points to a valid tofu binary
          if [ ! -f "$TF_ACC_TERRAFORM_PATH" ] && ! which "$TF_ACC_TERRAFORM_PATH" > /dev/null 2>&1; then
            echo "FAIL: TF_ACC_TERRAFORM_PATH does not point to a valid binary: $TF_ACC_TERRAFORM_PATH"
            exit 1
          fi
          echo "PASS: TF_ACC_TERRAFORM_PATH is set to '$TF_ACC_TERRAFORM_PATH'"
      - name: Assert TF_ACC_PROVIDER_NAMESPACE is set
        run: |
          echo "TF_ACC_PROVIDER_NAMESPACE: '$TF_ACC_PROVIDER_NAMESPACE'"
          if [ -z "$TF_ACC_PROVIDER_NAMESPACE" ]; then
            echo "FAIL: TF_ACC_PROVIDER_NAMESPACE environment variable is not set"
            exit 1
          fi
          echo "PASS: TF_ACC_PROVIDER_NAMESPACE is set to '$TF_ACC_PROVIDER_NAMESPACE'"
      - name: Assert TF_ACC_PROVIDER_HOST is set
        run: |
          echo "TF_ACC_PROVIDER_HOST: '$TF_ACC_PROVIDER_HOST'"
          if [ -z "$TF_ACC_PROVIDER_HOST" ]; then
            echo "FAIL: TF_ACC_PROVIDER_HOST environment variable is not set"
            exit 1
          fi
          echo "PASS: TF_ACC_PROVIDER_HOST is set to '$TF_ACC_PROVIDER_HOST'"

name: Retag

on:
  push:
    tags:
      - 'v[1-2].[0-9]+.[0-9]+*'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - run: |
        set -o pipefail
        git tag --force "$(grep '^v[1-2]\.[0-9]\+\.[0-9]\+\(.*\)\?$' <<< ${GITHUB_REF#refs/*/} | sed 's/^v\([1-2]\)\..*/v\1/')"
        git push --tag --force

